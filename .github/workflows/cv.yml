name: Build CV
on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.1.3/pandoc-3.1.3-1-amd64.deb
          sudo dpkg -i pandoc-3.1.3-1-amd64.deb

      - name: Build cv.html
        run: |
          pandoc pages/cv/cv.md -o pages/cv/cv.html \
            --standalone \
            --embed-resources \
            --citeproc \
            --from markdown+native_spans \
            --css pages/cv/cv.css \
            --csl pages/cv/author-year.csl \
            --lua-filter pages/cv/letterhead.lua \
            --lua-filter pages/cv/refs-by-type.lua \
            --lua-filter pages/cv/reorder-refs.lua \
            --lua-filter pages/cv/format-refs.lua \
            --lua-filter pages/cv/nolinks-refs.lua

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pages/cv/cv.html
          git diff --staged --quiet || git commit -m "Auto-build cv.html [skip ci]"
          git push
